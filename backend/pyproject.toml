[tool.ruff]
line-length = 110
target-version = "py312"
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "ASYNC", "S", "PT"]
ignore = [
    "E501",   # line-too-long handled by formatter
    "S311",   # random for non-crypto use is fine
    "B008",   # FastAPI Depends() default
    "S101",   # asserts in tests are correct
    "S105",   # OAuth "bearer" token_type literal is not a password
    "S110",   # try/except/pass is intentional for best-effort persistence (see db.py, elastic.py)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "PT", "B"]

[tool.mypy]
python_version = "3.12"
strict_optional = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true
ignore_missing_imports = true
exclude = ["tests/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
asyncio_mode = "auto"
