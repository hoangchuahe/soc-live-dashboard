services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
    depends_on:
      elasticsearch:
        condition: service_healthy
        required: false
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Optional ElasticSearch profile ───────────────────────────────────────
  # Run with:  docker compose --profile elastic up
  # Query:     curl http://localhost:9200/soc-events/_search?pretty
  elasticsearch:
    image: elasticsearch:8.15.0
    profiles: [elastic]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kibana:
    image: kibana:8.15.0
    profiles: [elastic]
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    restart: unless-stopped

volumes:
  es_data:
